# Run tests on every push and pull request so breaks show up in GitHub Actions.

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (smoke + round-trip + compatibility)
        run: pytest tests/ -v --tb=short

      - name: Registry integration script (full suite)
        run: python tests/registry_integration.py

      - name: Type check (non-blocking)
        run: mypy medlat/base.py medlat/utils.py medlat/modules/wrapper.py --ignore-missing-imports || true
